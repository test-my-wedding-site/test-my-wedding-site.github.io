<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache...</title>
</head>
<body>
    <script type="text/javascript">
        const version = "1.3.0";
        fetch(`/content.html?v=${version}`)
        .then(response => response.text())
        .then(html => {
            document.open();
            document.write(html);
            document.close();
        }).catch(error => console.error(error));
    </script>
</body>
</html>
